<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations</title>
    <link rel="stylesheet" href="animations.css">
</head>
<body>

    <h1>CSS Transitions & Animations</h1>

    
    <div class="spinner"></div>

    <div class="products">

        
        <div class="card fade-in">
            <div class="image-container">
                <img src="https://picsum.photos/300?1" alt="Product">
            </div>

            <div class="content">
                <h3>Product 1</h3>
                <p>$99</p>
                <button>Mua ngay</button>
            </div>
        </div>

        
        <div class="card fade-in">
            <div class="image-container">
                <img src="https://picsum.photos/300?2" alt="Product">
            </div>

            <div class="content">
                <h3>Product 2</h3>
                <p>$129</p>
                <button>Mua ngay</button>
            </div>
        </div>

       
        <div class="card fade-in">
            <div class="image-container">
                <img src="https://picsum.photos/300?3" alt="Product">
            </div>

            <div class="content">
                <h3>Product 3</h3>
                <p>$149</p>
                <button>Mua ngay</button>
            </div>
        </div>

    </div>

</body>
</html>
