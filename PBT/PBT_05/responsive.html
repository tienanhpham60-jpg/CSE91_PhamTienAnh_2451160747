<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Product Page</title>
    <link rel="stylesheet" href="responsive.css">
</head>
<body>

   
    <header class="header">
        <div class="logo">MyShop</div>

      
        <div class="hamburger">☰</div>

        
        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Sale</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    
    <main class="container">

        
        <aside class="sidebar">
            <h3>Filters</h3>

            <select>
                <option>All Products</option>
                <option>Electronics</option>
                <option>Fashion</option>
                <option>Sports</option>
            </select>
        </aside>

        
        <section class="product-grid">

            <div class="card">
                <img src="https://picsum.photos/300?1" alt="">
                <h3>Product 1</h3>
                <p>$99</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300?2" alt="">
                <h3>Product 2</h3>
                <p>$129</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300?3" alt="">
                <h3>Product 3</h3>
                <p>$149</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300?4" alt="">
                <h3>Product 4</h3>
                <p>$89</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300?5" alt="">
                <h3>Product 5</h3>
                <p>$199</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300?6" alt="">
                <h3>Product 6</h3>
                <p>$109</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300?7" alt="">
                <h3>Product 7</h3>
                <p>$159</p>
            </div>

            <div class="card">
                <img src="https://picsum.photos/300?8" alt="">
                <h3>Product 8</h3>
                <p>$119</p>
            </div>

        </section>

        
        <aside class="ads">
            <h3>Ads</h3>
            <p>Advertisement Area</p>
        </aside>

    </main>

   
    <footer class="footer">
        <p>© 2025 Responsive Product Page</p>
    </footer>

</body>
</html>
