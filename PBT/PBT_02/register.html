<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký tài khoản</title>
</head>
<body>

    <main>
        <h1>Đăng ký tài khoản mua hàng</h1>

        <form action="#" method="POST">

            <fieldset>
                <legend>Thông tin cá nhân</legend>

                <p>
                    <label for="fullname">Họ và tên:</label>
                    <input type="text" id="fullname" name="fullname" required minlength="2" maxlength="50" placeholder="Nhập đầy đủ họ và tên">
                </p>

                <p>
                    <label for="email">Địa chỉ email:</label>
                    <input type="email" id="email" name="email" required placeholder="vi_du@gmail.com">
                </p>

                <p>
                    <label for="phone">Số điện thoại:</label>
                    <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="Nhập số điện thoại 10 số">
                </p>

                <p>
                    <label for="dob">Ngày sinh:</label>
                    <input type="date" id="dob" name="dob" max="2026-05-31" placeholder="Chọn ngày sinh của bạn">
                </p>
            </fieldset>

            <fieldset>
                <legend>Tài khoản</legend>

                <p>
                    <label for="username">Tên đăng nhập:</label>
                    <input type="text" id="username" name="username" pattern="[A-Za-z0-9_]{3,20}" placeholder="Chỉ dùng chữ, số và dấu gạch dưới (3-20 ký tự)">
                </p>

                <p>
                    <label for="password">Mật khẩu:</label>
                    <input type="password" id="password" name="password" minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" placeholder="Tối thiểu 8 ký tự, có 1 chữ hoa và 1 số">
                </p>

                <p>
                    <label for="confirm_password">Xác nhận mật khẩu:</label>
                    <input type="password" id="confirm_password" name="confirm_password" minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" placeholder="Nhập lại mật khẩu phía trên">
                </p>
            </fieldset>

            <fieldset>
                <legend>Thông tin giao hàng</legend>

                <p>
                    <label for="city">Thành phố:</label>
                    <select id="city" name="city">
                        <option value="">-- Chọn Tỉnh / Thành phố --</option>
                        <option value="hanoi">Hà Nội</option>
                        <option value="hochiminh">Thành phố Hồ Chí Minh</option>
                        <option value="danang">Đà Nẵng</option>
                        <option value="haiphong">Hải Phòng</option>
                        <option value="cantho">Cần Thơ</option>
                    </select>
                </p>

                <p>
                    <label for="district">Quận / Huyện:</label>
                    <select id="district" name="district">
                        <option value="">-- Chọn Quận / Huyện --</option>
                        <option value="caugiay">Cầu Giấy</option>
                        <option value="dongda">Đống Đa</option>
                        <option value="quan1">Quận 1</option>
                        <option value="binhthanh">Bình Thạnh</option>
                    </select>
                </p>

                <p>
                    <label for="address_detail">Địa chỉ chi tiết:</label>
                    <textarea id="address_detail" name="address_detail" rows="3" placeholder="Nhập số nhà, tên đường, thôn xóm..."></textarea>
                </p>

                <p>
                    <span>Giới tính:</span>
                    <input type="radio" id="gender_male" name="gender" value="nam">
                    <label for="gender_male">Nam</label>

                    <input type="radio" id="gender_female" name="gender" value="nu">
                    <label for="gender_female">Nữ</label>

                    <input type="radio" id="gender_other" name="gender" value="khac">
                    <label for="gender_other">Khác</label>
                </p>
            </fieldset>

            <p>
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">Tôi đồng ý với mọi điều khoản sử dụng và chính sách bảo mật của hệ thống</label>
            </p>

            <p>
                <button type="submit">Đăng ký ngay</button>
                <button type="reset">Xóa làm lại</button>
            </p>

        </form>
    </main>

</body>
</html>
