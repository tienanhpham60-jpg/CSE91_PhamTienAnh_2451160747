<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang web - ShopTLU</title>
</head>
<body>

    <header>
        <h1>Welcome to ShopTLU</h1>
        <nav>
            <a href="#home">Trang chủ</a>
            <a href="#products">Sản phẩm</a>
        </nav>
    </header>
    
    <main>
        
        <section id="products">
            <h3>Sản phẩm hot</h3>
            <article>
                <figure>
                    <img src="iphone.jpg" alt="Điện thoại iPhone 16 Pro màu titan">
                </figure>
                <p>iPhone 16 Pro</p>
                <p>Giá: <b>25.990.000đ</b></p>
            </article>
        </section>
        
        <section>
            <h3>Thông tin</h3>
            <table>
                <thead>
                    <tr>
                        <th scope="col">Tên</th>
                        <th scope="col">Giá</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>iPhone</td>
                        <td>25tr</td>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>
    
    <aside>
        <p>Sidebar content</p>
    </aside>
    
    <footer>
        <p>&copy; 2026 ShopTLU. Toàn bộ bản quyền được bảo lưu.</p>
    </footer>

</body>
</html>
