<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thực nghiệm Box Model Lab</title>
    <link rel="stylesheet" href="boxmodel.css">
</head>
<body>

    <main>
        <h1>Phần 1: Thử nghiệm so sánh Content-box và Border-box</h1>
        <div class="box-container">
            <div class="box-test content-box-style">Hộp 1 (Content-box)</div>
            <div class="box-test border-box-style">Hộp 2 (Border-box)</div>
        </div>

        <br><br><hr><br>

        <h1>Phần 2: Xây dựng bố cục Layout cấu trúc 3 cột</h1>
        <div class="main-layout-container">
            <aside class="sidebar-column">Cột trái (Sidebar 250px)</aside>
            <section class="content-column">Cột giữa (Main Content 500px)</section>
            <aside class="ads-column">Cột phải (Ads Vận động 250px)</aside>
        </div>
    </main>

</body>
</html>
