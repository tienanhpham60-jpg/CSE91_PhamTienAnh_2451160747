<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h2>Đăng Ký Tài Khoản</h2>
        <form id="register-form">
            
            <div class="form-group">
                <label for="username">Họ và tên <span id="name-status"></span></label>
                <input type="text" id="username" placeholder="Nhập từ 2 - 50 ký tự">
                <small class="error-msg" id="name-error"></small>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="example@domain.com">
                <small class="error-msg" id="email-error"></small>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
                <div class="strength-container">
                    <div id="strength-bar" class="strength-bar"></div>
                </div>
                <small class="strength-text" id="strength-text">Chưa nhập mật khẩu</small>
            </div>

            <div class="form-group">
                <label for="confirm-password">Xác nhận mật khẩu</label>
                <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu">
                <small class="error-msg" id="confirm-error"></small>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại</label>
                <input type="text" id="phone" placeholder="0901-234-567" maxlength="12">
                <small class="error-msg" id="phone-error"></small>
            </div>

            <button type="submit" id="btn-submit" disabled>Đăng ký</button>
        </form>
    </div>

    <div id="success-modal" class="modal-mask hidden">
        <div class="modal-content">
            <h3>🎉 Đăng ký thành công!</h3>
            <div id="modal-info"></div>
            <button id="btn-close-modal">Đóng</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
