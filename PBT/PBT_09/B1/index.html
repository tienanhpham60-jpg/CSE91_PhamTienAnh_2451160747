<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="todoapp">
        <header class="header">
            <h1>todos</h1>
            <form id="todo-form">
                <input id="new-todo" class="new-todo" placeholder="Cần làm gì tiếp theo?" autofocus autocomplete="off">
            </form>
        </header>

        <section class="main">
            <ul id="todo-list" class="todo-list">
                </ul>
        </section>

        <footer class="footer">
            <span id="todo-count" class="todo-count">0 items left</span>
            
            <ul class="filters">
                <li><button data-filter="all" class="selected">All</button></li>
                <li><button data-filter="active">Active</button></li>
                <li><button data-filter="completed">Completed</button></li>
            </ul>

            <button id="clear-completed" class="clear-completed">Clear completed</button>
        </footer>
    </section>

    <script src="app.js"></script>
</body>
</html>
