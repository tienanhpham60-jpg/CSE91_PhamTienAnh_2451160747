<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sinh Viên - K66 BTTH03</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Hệ Thống Quản Lý Sinh Viên</h1>
            <div id="toast-notification" class="toast hidden"></div>
        </header>

        <section class="statistics-section">
            <div class="stat-card">
                <h3>Tổng số sinh viên</h3>
                <p id="total-students">0</p>
            </div>
            <div class="stat-card">
                <h3>Điểm trung bình lớp</h3>
                <p id="average-score">0.0</p>
            </div>
        </section>

        <main class="main-content">
            <div class="action-bar">
                <button id="btn-open-form" class="btn btn-primary">+ Thêm sinh viên mới</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Mã SV</th>
                            <th>Họ và Tên</th>
                            <th>Ngày Sinh</th>
                            <th>Lớp Học</th>
                            <th>Điểm TB</th>
                            <th>Email</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body">
                        <tr id="empty-row">
                            <td colspan="7" style="text-align: center; color: #94a3b8; padding: 2rem;">
                                Chưa có dữ liệu sinh viên. Vui lòng bấm nút thêm mới!
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="form-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="modal-title">Thêm Sinh Viên Mới</h2>
                <button id="btn-close-modal" class="close-x">&times;</button>
            </div>
            
            <form id="student-form">
                <input type="hidden" id="student-id-hidden">

                <div class="form-group">
                    <label for="student-code">Mã sinh viên *</label>
                    <input type="text" id="student-code" required placeholder="Ví dụ: SV1234">
                </div>

                <div class="form-group">
                    <label for="student-name">Họ và tên *</label>
                    <input type="text" id="student-name" required placeholder="Nguyễn Văn A">
                </div>

                <div class="form-group">
                    <label for="student-dob">Ngày sinh *</label>
                    <input type="date" id="student-dob" required>
                </div>

                <div class="form-group">
                    <label for="student-class">Lớp học *</label>
                    <input type="text" id="student-class" required placeholder="Ví dụ: K66-CNTT">
                </div>

                <div class="form-group">
                    <label for="student-grade">Điểm trung bình *</label>
                    <input type="number" id="student-grade" step="0.1" min="0" max="10" required placeholder="Từ 0 đến 10">
                </div>

                <div class="form-group">
                    <label for="student-email">Email *</label>
                    <input type="email" id="student-email" required placeholder="example@gmail.com">
                </div>

                <div class="modal-actions">
                    <button type="button" id="btn-cancel-form" class="btn btn-secondary">Hủy bỏ</button>
                    <button type="submit" id="btn-submit-form" class="btn btn-success">Lưu dữ liệu</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
